[versions]
kotlin           = "2.4.0"
netty            = "5.0.0.Alpha5"
mavenPublish     = "0.37.0"

[libraries]
netty-buffer    = { module = "io.netty:netty5-buffer",    version.ref = "netty" }
netty-transport = { module = "io.netty:netty5-transport", version.ref = "netty" }
netty-common    = { module = "io.netty:netty5-common",    version.ref = "netty" }

[plugins]
kotlin-jvm     = { id = "org.jetbrains.kotlin.jvm",          version.ref = "kotlin" }
maven-publish  = { id = "com.vanniktech.maven.publish",       version.ref = "mavenPublish" }
